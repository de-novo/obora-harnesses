name: generic-microstep-applier-real-safe-create-v1_1
version: "1.1"
description: "Very conservative real auto-apply that writes only single new-file safe-create payloads"

sandbox:
  enabled: true
  paths:
    - path: .
      mode: "rwx"
    - path: ./artifacts
      mode: "rwx"

agents:
  planner:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Real safe create v1.1 planner
    temperature: ${OBORA_TEMPERATURE:-0}
  contractor:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Real safe create v1.1 contractor
    temperature: ${OBORA_TEMPERATURE:-0}
  generator:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Real safe create v1.1 generator
    temperature: ${OBORA_TEMPERATURE:-0}
  evaluator:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Real safe create v1.1 evaluator
    temperature: ${OBORA_TEMPERATURE:-0}
steps:
  - name: load_apply_inputs
    agent: planner
    input:
      task: |
        Read:
        - artifacts/micro-units.json
        - artifacts/apply-order.json
        - docs/real-safe-create-v1_1-policy.md

        Write artifacts/real-apply-input-summary.md.

        Include only:
        - total units
        - total ordered batches
        - candidate create units
        - whether any hold/prepare units exist

  - name: filter_real_safe_create_candidates
    agent: contractor
    depends_on: [load_apply_inputs]
    input:
      task: |
        Read:
        - artifacts/micro-units.json
        - artifacts/apply-order.json
        - docs/real-safe-create-v1_1-policy.md

        Write EXACTLY one JSON object to artifacts/real-safe-create-candidates.json.
        No markdown fences. No prose.

        Required shape:
        {
          "candidates":[
            {
              "unitId":"u1",
              "targetFile":"path/to/file",
              "reason":"..."
            }
          ],
          "skipped":[
            {
              "unitId":"u2",
              "reason":"..."
            }
          ],
          "notes":"..."
        }

  - name: prepare_real_create_payloads
    agent: generator
    depends_on: [filter_real_safe_create_candidates]
    input:
      task: |
        Read artifacts/real-safe-create-candidates.json.

        Write EXACTLY one JSON object to artifacts/real-safe-create-payloads.json.
        No markdown fences. No prose.

        Required shape:
        {
          "payloads":[
            {
              "unitId":"u1",
              "targetFile":"path/to/file",
              "content":"AUTO-CREATED-BY-REAL-SAFE-CREATE-V1_1\n"
            }
          ]
        }

        If there are no candidates, return an empty payload list.

  - name: validate_real_create_payloads
    agent: evaluator
    depends_on: [prepare_real_create_payloads]
    input:
      task: |
        Read:
        - artifacts/real-safe-create-candidates.json
        - artifacts/real-safe-create-payloads.json

        Write artifacts/real-safe-create-validation.json with exactly:
        {"passed":true,"summary":"real-safe-create-v1_1-ready","failedChecks":[],"signature":"real-safe-create-v1_1-ready"}

  - name: apply_real_safe_create
    agent: generator
    depends_on: [validate_real_create_payloads]
    input:
      task: |
        Read:
        - artifacts/real-safe-create-payloads.json
        - docs/real-safe-create-v1_1-policy.md

        For each payload, write the target file ONLY IF the target file does not already exist.

        Also write EXACTLY one JSON object to artifacts/applied-files.json.
        No markdown fences. No prose.

        Required shape:
        {
          "applied":[{"targetFile":"...","overwrite":false}],
          "skipped":[{"targetFile":"...","reason":"..."}]
        }

        Rules:
        - never overwrite existing files
        - skip existing targets
        - only write files from payloads

  - name: summarize_real_apply
    agent: evaluator
    depends_on: [apply_real_safe_create]
    input:
      task: |
        Read:
        - artifacts/real-apply-input-summary.md
        - artifacts/real-safe-create-candidates.json
        - artifacts/applied-files.json

        Write artifacts/real-apply-summary.md.

        Include only:
        - candidate count
        - applied count
        - skipped count
        - whether overwrite was avoided
        - recommended next action
