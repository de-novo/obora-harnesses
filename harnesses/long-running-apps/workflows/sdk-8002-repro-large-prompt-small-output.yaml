name: sdk-8002-repro-large-prompt-small-output
version: "1.0"
description: "Stress repro: very large prompt, tiny output"

sandbox:
  enabled: true
  paths:
    - path: .
      mode: "rwx"
    - path: ./artifacts
      mode: "rwx"

agents:
  planner:
    provider: zai
    model: glm-4.7
    role: Large prompt stress agent
    temperature: 0

steps:
  - name: large_prompt_write
    agent: planner
    input:
      task: |
        This is a large-prompt stress repro for SDK_8002.

        Your actual required output is very small.
        Ignore the fact that the instruction body is long; it exists only to increase prompt complexity.

        Context block A:
        - We are testing cancellation behavior in a workflow engine.
        - We want to separate prompt size from chain depth.
        - We want to separate prompt size from output formatting complexity.
        - We want to separate prompt size from multi-file generation.
        - The final output must remain tiny and deterministic.

        Context block B:
        - The system has previously succeeded on write-only workflow.
        - The system has previously succeeded on read-then-write workflow.
        - The system has previously succeeded on a 4-step chain workflow.
        - The system has previously succeeded on a short research-style prompt.
        - Therefore this repro specifically targets prompt size / instruction density.

        Context block C:
        - Do not browse the web.
        - Do not create multiple files.
        - Do not return markdown in the tool response.
        - Do not generate structured JSON in the tool response.
        - Do not produce analysis text outside the requested file.

        Context block D:
        - Imagine a frontend framework comparison among React, Vue, Svelte, and Solid.
        - Imagine evaluation criteria such as ecosystem, bundle size, performance, learning curve, hiring pool, TypeScript support, tooling maturity, SSR support, and future-proofing.
        - Imagine additional considerations such as runtime model, compiler usage, fine-grained reactivity, server rendering strategy, form handling, developer experience, and maintainability.
        - Imagine a long planning phase, but do not actually write it out.
        - Keep the final artifact tiny.

        Context block E:
        - Repeat the goal internally: large prompt, tiny output.
        - Repeat the rule internally: one file only.
        - Repeat the success marker internally: LARGE-PROMPT-OK.
        - Repeat the failure interpretation internally: if this cancels, prompt size becomes a stronger suspect.
        - Repeat the scope internally: no chain complexity, no evaluator, no structured return.

        Context block F:
