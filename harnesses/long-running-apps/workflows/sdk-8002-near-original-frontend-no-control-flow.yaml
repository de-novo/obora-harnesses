name: sdk-8002-near-original-frontend-no-control-flow
version: "1.0"
description: "Near-original repro of frontend upgrade workflow without on_fail/goto retry control flow"

sandbox:
  enabled: true
  paths:
    - path: .
      mode: "rwx"
    - path: ./artifacts
      mode: "rwx"
    - path: ./packages/web
      mode: "rwx"

agents:
  planner:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Frontend framework researcher and planner
    temperature: 0.2
  contractor:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Frontend contractor
    temperature: 0.1
  generator:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Frontend implementation agent
    temperature: 0.1
  evaluator:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Frontend evaluator
    temperature: ${OBORA_TEMPERATURE:-0}
steps:
  - name: research_frameworks
    agent: planner
    input:
      task: |
        Research modern frontend frameworks for 2026.

        Investigate:
        - React 19
        - Vue 4
        - Svelte 6
        - Solid 3

        Write research findings to artifacts/framework-research.md.

        Include for each framework:
        - Latest version and key features
        - Bundle size and performance
        - Learning curve
        - Ecosystem maturity
        - TypeScript support
        - Production suitability

        Then write artifacts/framework-decision.md with:
        - Comparison table
        - Pros and cons for Todo app use case
        - Final recommendation with rationale
        - Selection criteria used

  - name: define_upgrade_contract
    agent: contractor
    depends_on: [research_frameworks]
    input:
      task: |
        Read:
        - artifacts/framework-research.md
        - artifacts/framework-decision.md

        Write EXACTLY one JSON object to artifacts/upgrade-contract.json.
        No markdown fences. No prose.

        Required shape:
        {
          "selectedFramework": "...",
          "selectionRationale": "...",
          "scope": "Upgrade packages/web from vanilla HTML to selected framework",
          "acceptanceCriteria": [
            "Framework properly configured",
            "All existing features work (add/complete/delete)",
            "Build process works",
            "Dev server runs",
            "Production build succeeds"
          ],
          "nonGoals": [
            "No API changes",
            "No new features",
            "No backend modifications"
          ],
          "qaChecks": [
            "npm install succeeds",
            "npm run dev starts dev server",
            "npm run build creates production bundle",
            "Todo CRUD operations work in browser"
          ],
          "taskBreakdown": [
            "Setup framework and build tooling",
            "Convert HTML structure to framework components",
            "Migrate vanilla JS to framework patterns",
            "Configure dev and build scripts",
            "Test all features"
          ],
          "definitionOfDone": "All features work, build succeeds, dev server runs"
        }

  - name: setup_framework
    agent: generator
    depends_on: [define_upgrade_contract]
    input:
      task: |
        Read:
        - artifacts/framework-decision.md
        - artifacts/upgrade-contract.json

        Setup the selected frontend framework in packages/web.

        Tasks:
        - Update packages/web/package.json with framework dependencies
        - Add build tooling
        - Create framework entry point
        - Configure dev server with API proxy (localhost:3001)
        - Add TypeScript if appropriate

        Write:
        - packages/web/package.json
        - packages/web/vite.config.js or vite.config.ts
        - packages/web/index.html
        - packages/web/src/main.js or main.tsx

  - name: migrate_components
    agent: generator
    depends_on: [setup_framework]
    input:
      task: |
        Read:
        - artifacts/upgrade-contract.json
        - Current packages/web/app.js if it exists

        Migrate frontend to framework components.

        Create:
        - packages/web/src/App.tsx or App.vue or equivalent
        - packages/web/src/components/TodoForm.*
        - packages/web/src/components/TodoList.*
        - packages/web/src/components/TodoItem.*
        - packages/web/src/services/api.*
        - packages/web/src/types/todo.* if needed

        Keep same functionality:
        - Fetch todos from API
        - Display todo list
        - Add new todo
        - Mark as complete
        - Delete todo
        - Show stats

  - name: migrate_styles
    agent: generator
    depends_on: [migrate_components]
    input:
      task: |
        Read current packages/web/styles.css if it exists.

        Migrate styles to the new framework structure.

        Write updated style files so the UI includes:
        - responsive layout
        - form styling
        - todo list styling
        - completed state styling
        - footer/actions styling

  - name: evaluate_upgrade
    agent: evaluator
    depends_on: [migrate_styles]
    input:
      task: |
        Read:
        - artifacts/upgrade-contract.json
        - artifacts/framework-decision.md

        Evaluate the framework upgrade.

        Check:
        - framework correctly installed
        - build process works conceptually
        - dev server config exists
        - CRUD UI structure is present
        - style files exist
        - no obvious missing core files

        Write artifacts/upgrade-qa-report.json.

        Then return ONLY a strict ValidationResult JSON object.
        No markdown fences. No prose.

        ValidationResult shape:
        {
          "passed": true or false,
          "summary": "...",
          "failedChecks": [
            {"name":"...","message":"...","file":"..."}
          ],
          "signature": "stable-short-signature"
        }