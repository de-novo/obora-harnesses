name: generic-microstep-applier-modify-safe-v1
version: "1.0"
description: "Conservative modify-safe applier for single-file exact-replace capable modify units"

sandbox:
  enabled: true
  paths:
    - path: .
      mode: "rwx"
    - path: ./artifacts
      mode: "rwx"

agents:
  planner:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Modify-safe v1 planner
    temperature: ${OBORA_TEMPERATURE:-0}
  contractor:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Modify-safe v1 contractor
    temperature: ${OBORA_TEMPERATURE:-0}
  generator:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Modify-safe v1 generator
    temperature: ${OBORA_TEMPERATURE:-0}
  evaluator:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Modify-safe v1 evaluator
    temperature: ${OBORA_TEMPERATURE:-0}
steps:
  - name: load_modify_inputs
    agent: planner
    input:
      task: |
        Read:
        - artifacts/micro-units.json
        - artifacts/apply-order.json
        - /Users/denovo/workspace/github/obora-harnesses/docs/modify-safe-v1-policy.md

        Write artifacts/modify-apply-input-summary.md.

        Include only:
        - total units
        - modify unit count
        - apply candidates count
        - whether any non-modify units were excluded

  - name: filter_modify_candidates
    agent: contractor
    depends_on: [load_modify_inputs]
    input:
      task: |
        Read:
        - artifacts/micro-units.json
        - artifacts/apply-order.json
        - /Users/denovo/workspace/github/obora-harnesses/docs/modify-safe-v1-policy.md

        Write EXACTLY one JSON object to artifacts/modify-safe-candidates.json.
        No markdown fences. No prose.

        Required shape:
        {
          "candidates":[
            {
              "unitId":"u1",
              "targetFile":"path/to/file",
              "reason":"..."
            }
          ],
          "skipped":[
            {
              "unitId":"u2",
              "reason":"..."
            }
          ],
          "notes":"..."
        }

        Rules:
        - only include modify units
        - only include single-file units
        - only include units from apply batches
        - skip destructive or uncertain units

  - name: derive_exact_replace_payloads
    agent: generator
    depends_on: [filter_modify_candidates]
    input:
      task: |
        Read artifacts/modify-safe-candidates.json.

        Write EXACTLY one JSON object to artifacts/modify-safe-payloads.json.
        No markdown fences. No prose.

        Required shape:
        {
          "payloads":[
            {
              "unitId":"u1",
              "targetFile":"path/to/file",
              "replaceMode":"exact",
              "oldText":"...",
              "newText":"..."
            }
          ]
        }

        If no safe exact-replace payload can be derived, return an empty payload list.
        Prefer safety over coverage.

  - name: validate_modify_payloads
    agent: evaluator
    depends_on: [derive_exact_replace_payloads]
    input:
      task: |
        Read:
        - artifacts/modify-safe-candidates.json
        - artifacts/modify-safe-payloads.json
        - /Users/denovo/workspace/github/obora-harnesses/docs/modify-safe-v1-policy.md

        Validate payloads only.

        Check:
        - payload targets single file
        - replaceMode is exact
        - oldText/newText fields exist
        - payload is conservative

        Write artifacts/modify-safe-validation.json.

        Then return ONLY this JSON object:
        {"passed":true,"summary":"modify-safe-v1-ready","failedChecks":[],"signature":"modify-safe-v1-ready"}

  - name: summarize_modify_plan
    agent: evaluator
    depends_on: [validate_modify_payloads]
    input:
      task: |
        Read:
        - artifacts/modify-apply-input-summary.md
        - artifacts/modify-safe-candidates.json
        - artifacts/modify-safe-payloads.json
        - artifacts/modify-safe-validation.json

        Write artifacts/modify-safe-summary.md.

        Include only:
        - candidate count
        - payload count
        - skipped count
        - whether exact replace payloads are ready
        - note that actual modify apply remains disabled until explicit write step is added
