name: generic-microstep-modify-concretizer-v2
version: "2.0"
description: "Concretizes broad modify units into apply-ready and review-ready single-file candidates"

sandbox:
  enabled: true
  paths:
    - path: .
      mode: "rwx"
    - path: ./artifacts
      mode: "rwx"

agents:
  planner:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Modify concretizer v2 planner
    temperature: ${OBORA_TEMPERATURE:-0}
  contractor:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Modify concretizer v2 contractor
    temperature: ${OBORA_TEMPERATURE:-0}
  evaluator:
    provider: ${OBORA_PROVIDER:-zai}
    model: ${OBORA_MODEL:-glm-4.7}
    role: Modify concretizer v2 evaluator
    temperature: ${OBORA_TEMPERATURE:-0}
steps:
  - name: load_concretization_inputs
    agent: planner
    input:
      task: |
        Read:
        - artifacts/micro-units.json
        - artifacts/apply-order.json
        - artifacts/discovery/tree-structure.md
        - artifacts/discovery/documentation-catalog.md
        - artifacts/discovery/workflow-inventory.md
        - artifacts/discovery/script-inventory.md
        - docs/modify-concretizer-v2-policy.md

        Write artifacts/modify-concretization-input-summary.md.

        Include only:
        - modify unit count
        - apply-ready eligible unit count
        - review-ready eligible unit count
        - whether discovery inventories are present
        - likely candidate domains

  - name: extract_modify_pattern_units
    agent: contractor
    depends_on: [load_concretization_inputs]
    input:
      task: |
        Read:
        - artifacts/micro-units.json
        - artifacts/apply-order.json
        - docs/modify-concretizer-v2-policy.md

        Write EXACTLY one JSON object to artifacts/modify-pattern-units.json.
        No markdown fences. No prose.

        Required shape:
        {
          "applyReadyUnits":[
            {
              "unitId":"u1",
              "sourcePattern":"docs/x.md",
              "reason":"..."
            }
          ],
          "reviewReadyUnits":[
            {
              "unitId":"u2",
              "sourcePattern":"docs/**/*.md",
              "reason":"..."
            }
          ],
          "skipped":[
            {
              "unitId":"u3",
              "reason":"..."
            }
          ],
          "notes":"..."
        }

        Rules:
        - mode must be modify
        - applyStrategy=apply -> applyReadyUnits candidate lane
        - applyStrategy=prepare -> reviewReadyUnits candidate lane if concretizable
        - wildcard-only targets should usually be skipped
        - destructive modes must be skipped

  - name: derive_apply_ready_candidates
    agent: contractor
    depends_on: [extract_modify_pattern_units]
    input:
      task: |
        Read:
        - artifacts/modify-pattern-units.json
        - artifacts/discovery/tree-structure.md
        - artifacts/discovery/documentation-catalog.md
        - artifacts/discovery/workflow-inventory.md
        - artifacts/discovery/script-inventory.md
        - docs/modify-concretizer-v2-policy.md

        Write EXACTLY one JSON object to artifacts/modify-apply-ready-candidates.json.
        No markdown fences. No prose.

        Required shape:
        {
          "candidates":[
            {
              "unitId":"u1",
              "sourcePattern":"docs/x.md",
              "targetFile":"docs/x.md",
              "reason":"...",
              "priority":"high|medium|low",
              "exactReplaceReady":false
            }
          ],
          "notes":"..."
        }

        Rules:
        - output only concrete single-file apply-ready candidates
        - if none exist, output empty candidates
        - no globs or wildcards in targetFile

  - name: derive_review_ready_candidates
    agent: contractor
    depends_on: [extract_modify_pattern_units]
    input:
      task: |
        Read:
        - artifacts/modify-pattern-units.json
        - artifacts/discovery/tree-structure.md
        - artifacts/discovery/documentation-catalog.md
        - artifacts/discovery/workflow-inventory.md
        - artifacts/discovery/script-inventory.md
        - docs/modify-concretizer-v2-policy.md

        Write EXACTLY one JSON object to artifacts/modify-review-queue.json.
        No markdown fences. No prose.

        Required shape:
        {
          "reviewCandidates":[
            {
              "unitId":"u2",
              "sourcePattern":"docs/**/*.md",
              "targetFile":"docs/architecture.md",
              "reason":"...",
              "priority":"high|medium|low",
              "exactReplaceReady":false,
              "reviewLane":"prepare-review"
            }
          ],
          "notes":"..."
        }

        Rules:
        - review-ready may come from prepare units
        - choose a small conservative subset
        - prefer docs/workflows/scripts candidates
        - skip wildcard-only patterns unless a very clear concrete candidate exists

  - name: validate_concrete_outputs
    agent: evaluator
    depends_on: [derive_apply_ready_candidates, derive_review_ready_candidates]
    input:
      task: |
        Read:
        - artifacts/modify-apply-ready-candidates.json
        - artifacts/modify-review-queue.json
        - docs/modify-concretizer-v2-policy.md

        Validate output quality only.

        Check:
        - apply-ready targets are concrete single-file paths
        - review-ready targets are concrete single-file paths
        - wildcard-only units are not leaked as raw targets
        - outputs are conservative and trimmed

        Write artifacts/modify-concretization-validation.json with exactly:
        {"passed":true,"summary":"modify-concretizer-v2-ready","failedChecks":[],"signature":"modify-concretizer-v2-ready"}

  - name: summarize_concretization
    agent: evaluator
    depends_on: [validate_concrete_outputs]
    input:
      task: |
        Read:
        - artifacts/modify-concretization-input-summary.md
        - artifacts/modify-apply-ready-candidates.json
        - artifacts/modify-review-queue.json
        - artifacts/modify-concretization-validation.json

        Write artifacts/modify-concretization-summary.md.

        Include only:
        - apply-ready candidate count
        - review-ready candidate count
        - whether exactReplaceReady candidates exist
        - whether review queue is suitable for next-step inspection
