name: generic-microstep-executor
version: "1.0"
description: "Generic reusable executor that validates and prepares execution of micro-units from a generated plan"

sandbox:
  enabled: true
  paths:
    - path: .
      mode: "rwx"
    - path: ./artifacts
      mode: "rwx"

agents:
  planner:
    provider: zai
    model: glm-4.7
    role: Generic executor preflight planner
    temperature: 0
  contractor:
    provider: zai
    model: glm-4.7
    role: Generic execution contractor
    temperature: 0
  evaluator:
    provider: zai
    model: glm-4.7
    role: Generic executor evaluator
    temperature: 0

steps:
  - name: load_and_classify_units
    agent: planner
    input:
      task: |
        Read:
        - artifacts/micro-units.json
        - artifacts/phase-plan.md
        - artifacts/goal-interpretation.md
        - docs/microstep-phase-policy.md

        Write artifacts/executor-input-summary.md.

        Include only:
        - total unit count
        - phase breakdown
        - mode breakdown
        - whether destructive actions exist
        - whether impact notes are present

  - name: preflight_validate_units
    agent: evaluator
    depends_on: [load_and_classify_units]
    input:
      task: |
        Read:
        - artifacts/micro-units.json
        - artifacts/executor-input-summary.md
        - docs/microstep-phase-policy.md

        Validate executor readiness.

        Check:
        - every unit has id, phase, mode, goal
        - targetFiles exist in schema
        - destructive units have impactNotes
        - executionRules exist
        - unit scope is not obviously broad

        Write artifacts/executor-preflight.json.

        Then return ONLY this JSON object:
        {"passed":true,"summary":"executor-preflight-ok","failedChecks":[],"signature":"executor-preflight-ok"}

  - name: derive_execution_batches
    agent: contractor
    depends_on: [preflight_validate_units]
    input:
      task: |
        Read:
        - artifacts/micro-units.json
        - artifacts/executor-preflight.json

        Write EXACTLY one JSON object to artifacts/execution-batches.json.
        No markdown fences. No prose.

        Required shape:
        {
          "batches":[
            {
              "id":"b1",
              "unitIds":["u1"],
              "reason":"..."
            }
          ],
          "strategy":"single-unit or very-small-batch execution",
          "notes":"..."
        }

        Rules:
        - prefer single-unit batches
        - destructive units must never be grouped broadly
        - broad modes should be isolated

  - name: summarize_executor_plan
    agent: evaluator
    depends_on: [derive_execution_batches]
    input:
      task: |
        Read:
        - artifacts/executor-input-summary.md
        - artifacts/executor-preflight.json
        - artifacts/execution-batches.json

        Write artifacts/execution-summary.md.

        Include only:
        - whether executor is ready
        - total units
        - total batches
        - destructive batches if any
        - recommended next action to actually apply batches
