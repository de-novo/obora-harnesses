name: todo-cli-enhanced
version: "1.0"
description: "Bounded long-running product harness for a small Todo CLI"

agents:
  planner:
    provider: zai
    model: glm-4.7
    role: Product planner
    temperature: 0.2
  contractor:
    provider: zai
    model: glm-4.7
    role: Task contractor
    temperature: 0.1
  generator:
    provider: zai
    model: glm-4.7
    role: CLI implementation agent
    temperature: 0.1
  evaluator:
    provider: zai
    model: glm-4.7
    role: CLI evaluator
    temperature: 0

steps:
  - name: plan_product
    agent: planner
    input:
      task: |
        Create a concise product spec for a local Todo CLI.

        Write to artifacts/spec.md.

        Include only:
        - target user
        - primary use cases
        - required commands
        - non-goals
        - quality expectations

        Important:
        - do not prescribe detailed code structure
        - do not lock implementation to specific function/class/file designs unless strictly necessary
        - focus on product intent, boundaries, and success conditions

  - name: define_contract
    agent: contractor
    depends_on: [plan_product]
    input:
      task: |
        Read artifacts/spec.md.

        Write EXACTLY one JSON object to artifacts/task-contract.json.
        No markdown fences. No prose.

        Required shape:
        {
          "scope":"...",
          "acceptanceCriteria":["..."],
          "nonGoals":["..."],
          "qaChecks":["..."],
          "taskBreakdown":["..."],
          "definitionOfDone":"..."
        }

        Rules:
        - keep the scope very small and bounded
        - this first slice should only target a minimal core: help, add, and list with local persistence
        - explicitly defer done, delete/remove, and clear to future iterations
        - taskBreakdown must contain only 2-4 very small execution-ordered tasks
        - do not prescribe unnecessary low-level code structure
        - define what must be true when this implementation slice is done

  - name: implement_scaffold
    agent: generator
    depends_on: [define_contract]
    input:
      task: |
        Read:
        - artifacts/spec.md
        - artifacts/task-contract.json
        - artifacts/qa-report.json if it exists

        Implement only the smallest possible scaffold for the current contract.

        Scope for this step:
        - ensure the CLI entrypoint exists and runs
        - ensure help output exists
        - ensure local file persistence scaffold exists

        Rules:
        - do not implement done/delete/clear
        - do not implement polish work
        - keep changes very small
        - if useful, update artifacts/implementation-notes.md with short notes only

  - name: implement_add_list
    agent: generator
    depends_on: [implement_scaffold]
    input:
      task: |
        Read:
        - artifacts/spec.md
        - artifacts/task-contract.json
        - artifacts/implementation-notes.md if it exists
        - artifacts/qa-report.json if it exists

        Extend the current scaffold only enough to support:
        - add
        - list
        - correct local persistence for those commands

        Rules:
        - preserve the existing entrypoint/help behavior
        - keep the artifact runnable
        - avoid speculative extra features
        - if repairing, change only what is needed to address evaluator feedback

  - name: evaluate_contract_slice1
    agent: evaluator
    depends_on: [implement_add_list]
    on_fail:
      goto: implement_add_list
      max_iterations: 2
      escalate_on_exhaust: fail
    input:
      task: |
        Read:
        - artifacts/spec.md
        - artifacts/task-contract.json
        - artifacts/implementation-notes.md if it exists

        Evaluate the current Todo CLI artifact against the current contract.

        Check for:
        - help output clarity
        - add command behavior
        - list command behavior
        - storage correctness for the implemented slice
        - understandable error handling
        - obvious maintainability issues

        Write a structured QA report to artifacts/qa-report-slice1.json.

        Then return ONLY a strict ValidationResult JSON object.
        No markdown fences. No prose.

        ValidationResult shape:
        {
          "passed": true or false,
          "summary": "...",
          "failedChecks": [
            {"name":"...","message":"...","file":"..."}
          ],
          "signature": "stable-short-signature"
        }

  # Slice-2: done/delete/clear
  - name: define_contract_slice2
    agent: contractor
    depends_on: [evaluate_contract_slice1]
    input:
      task: |
        Read artifacts/spec.md and artifacts/task-contract.json.

        Write EXACTLY one JSON object to artifacts/task-contract-slice2.json.
        No markdown fences. No prose.

        Required shape:
        {
          "scope":"...",
          "acceptanceCriteria":["..."],
          "nonGoals":["..."],
          "qaChecks":["..."],
          "taskBreakdown":["..."],
          "definitionOfDone":"..."
        }

        Rules:
        - this slice targets done, delete, and clear commands
        - assume help/add/list are already implemented
        - taskBreakdown must contain only 2-3 very small execution-ordered tasks
        - do not prescribe unnecessary low-level code structure
        - define what must be true when this slice is done

  - name: implement_done
    agent: generator
    depends_on: [define_contract_slice2]
    input:
      task: |
        Read:
        - artifacts/spec.md
        - artifacts/task-contract-slice2.json
        - artifacts/implementation-notes.md if it exists
        - artifacts/qa-report-slice1.json if it exists

        Extend the current Todo CLI to support the done command.

        Scope for this step:
        - add done <id> command
        - mark a todo as completed
        - update storage correctly
        - preserve existing help/add/list behavior

        Rules:
        - keep changes very small
        - update artifacts/implementation-notes.md with short notes

  - name: implement_delete
    agent: generator
    depends_on: [implement_done]
    input:
      task: |
        Read:
        - artifacts/spec.md
        - artifacts/task-contract-slice2.json
        - artifacts/implementation-notes.md if it exists

        Extend the current Todo CLI to support the delete command.

        Scope for this step:
        - add delete <id> command
        - remove a todo by id
        - update storage correctly
        - preserve existing help/add/list/done behavior

        Rules:
        - keep changes very small
        - update artifacts/implementation-notes.md with short notes

  - name: implement_clear
    agent: generator
    depends_on: [implement_delete]
    input:
      task: |
        Read:
        - artifacts/spec.md
        - artifacts/task-contract-slice2.json
        - artifacts/implementation-notes.md if it exists

        Extend the current Todo CLI to support the clear command.

        Scope for this step:
        - add clear command
        - delete all completed todos
        - update storage correctly
        - preserve existing help/add/list/done/delete behavior

        Rules:
        - keep changes very small
        - update artifacts/implementation-notes.md with short notes

  - name: evaluate_contract_slice2
    agent: evaluator
    depends_on: [implement_clear]
    on_fail:
      goto: implement_done
      max_iterations: 2
      escalate_on_exhaust: fail
    input:
      task: |
        Read:
        - artifacts/spec.md
        - artifacts/task-contract-slice2.json
        - artifacts/implementation-notes.md if it exists

        Evaluate the current Todo CLI artifact against the slice-2 contract.

        Check for:
        - done command behavior
        - delete command behavior
        - clear command behavior
        - storage correctness after destructive operations
        - understandable error handling
        - obvious maintainability issues

        Write a structured QA report to artifacts/qa-report-slice2.json.

        Then return ONLY a strict ValidationResult JSON object.
        No markdown fences. No prose.

        ValidationResult shape:
        {
          "passed": true or false,
          "summary": "...",
          "failedChecks": [
            {"name":"...","message":"...","file":"..."}
          ],
          "signature": "stable-short-signature"
        }

