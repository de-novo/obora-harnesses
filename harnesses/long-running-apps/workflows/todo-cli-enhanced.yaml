name: todo-cli-enhanced
version: "1.0"
description: "Bounded long-running product harness for a small Todo CLI"

agents:
  planner:
    provider: zai
    model: glm-4.7
    role: Product planner
    temperature: 0.2
  contractor:
    provider: zai
    model: glm-4.7
    role: Task contractor
    temperature: 0.1
  generator:
    provider: zai
    model: glm-4.7
    role: CLI implementation agent
    temperature: 0.1
  evaluator:
    provider: zai
    model: glm-4.7
    role: CLI evaluator
    temperature: 0

steps:
  - name: plan_product
    agent: planner
    input:
      task: |
        Create a concise product spec for a local Todo CLI.

        Write to artifacts/spec.md.

        Include only:
        - target user
        - primary use cases
        - required commands
        - non-goals
        - quality expectations

        Important:
        - do not prescribe detailed code structure
        - do not lock implementation to specific function/class/file designs unless strictly necessary
        - focus on product intent, boundaries, and success conditions

  - name: define_contract
    agent: contractor
    depends_on: [plan_product]
    input:
      task: |
        Read artifacts/spec.md.

        Write EXACTLY one JSON object to artifacts/task-contract.json.
        No markdown fences. No prose.

        Required shape:
        {
          "scope":"...",
          "acceptanceCriteria":["..."],
          "nonGoals":["..."],
          "qaChecks":["..."],
          "taskBreakdown":["..."],
          "definitionOfDone":"..."
        }

        Rules:
        - keep the scope bounded
        - taskBreakdown must contain small, explicit, execution-ordered tasks
        - do not prescribe unnecessary low-level code structure
        - define what must be true when this implementation slice is done

  - name: implement_contract
    agent: generator
    depends_on: [define_contract]
    input:
      task: |
        Read:
        - artifacts/spec.md
        - artifacts/task-contract.json
        - artifacts/qa-report.json if it exists

        Implement the Todo CLI inside the current working directory.

        Requirements:
        - satisfy the current contract first
        - follow the taskBreakdown in order
        - keep the artifact runnable
        - avoid unnecessary extra features
        - avoid speculative large rewrites
        - if repairing, change only what is needed to address evaluator feedback

        If useful, update artifacts/implementation-notes.md with only short high-value notes.

  - name: evaluate_contract
    agent: evaluator
    depends_on: [implement_contract]
    on_fail:
      goto: implement_contract
      max_iterations: 2
      escalate_on_exhaust: fail
    input:
      task: |
        Read:
        - artifacts/spec.md
        - artifacts/task-contract.json
        - artifacts/implementation-notes.md if it exists

        Evaluate the current Todo CLI artifact against the current contract.

        Check for:
        - command coverage
        - storage correctness
        - help output clarity
        - understandable error handling
        - obvious maintainability issues

        Write a structured QA report to artifacts/qa-report.json.

        Then return ONLY a strict ValidationResult JSON object.
        No markdown fences. No prose.

        ValidationResult shape:
        {
          "passed": true or false,
          "summary": "...",
          "failedChecks": [
            {"name":"...","message":"...","file":"..."}
          ],
          "signature": "stable-short-signature"
        }

  - name: summarize_comparison
    agent: evaluator
    depends_on: [evaluate_contract]
    input:
      task: |
        Read:
        - artifacts/spec.md
        - artifacts/task-contract.json
        - artifacts/qa-report.json

        Write a short summary to artifacts/comparison-summary.md.

        Include:
        - what the enhanced artifact achieved
        - what still looks weak or incomplete
        - why this artifact is stronger or weaker than a one-shot baseline
